# Render Blueprint para el backend de Nicté (FastAPI + RAG).
# Render lee este archivo desde la raíz del repo. El servicio vive en /backend.
#
# Nota de recursos: el arranque carga sentence-transformers (PyTorch) y
# construye el índice de embeddings sobre todo el corpus en memoria. El plan
# free (512 MB RAM) hace Out-Of-Memory; usar al menos "standard" (2 GB).
services:
  - type: web
    name: nicte-api
    runtime: python
    plan: standard
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from app.rag import RAGRetriever; RAGRetriever()"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Definir en el dashboard de Render (no se versiona la llave).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: PYTHON_VERSION
        value: "3.12.4"
