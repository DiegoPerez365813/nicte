# Render Blueprint para el backend de Nicté (FastAPI + RAG).
# Render lee este archivo desde la raíz del repo. El servicio vive en /backend.
#
# Embeddings via Voyage AI API (voyage-law-2) — no PyTorch local.
# El plan free (512 MB) es suficiente; standard solo si se requiere más RAM.
services:
  - type: web
    name: nicte-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Definir en el dashboard de Render (no se versionan las llaves).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: PYTHON_VERSION
        value: "3.12.4"
